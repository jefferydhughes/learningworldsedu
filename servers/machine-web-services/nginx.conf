#
# This is the NGINX config file for the web services machine. (on DigitalOcean)
# On the production server, this file is located at /voxowl/nginx/nginx.conf
#

worker_processes 1;

events {}

http {

    # Use docker DNS server to resolve hostnames
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen              443 ssl default_server;
        server_name         discord.cu.bzh;
        ssl_certificate     /cubzh/certificates/cu.bzh.chained.crt;
        ssl_certificate_key /cubzh/certificates/cu.bzh.key;
        location / {
            set $service_name wasm-discord;
            proxy_pass https://$service_name:443$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen              443 ssl;
        server_name         docs.cu.bzh;
        ssl_certificate     /cubzh/certificates/cu.bzh.chained.crt;
        ssl_certificate_key /cubzh/certificates/cu.bzh.key;
        location / {
            set $service_name lua-docs;
            proxy_pass http://$service_name$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen              443 ssl;
        server_name         debug.cu.bzh;
        ssl_certificate     /cubzh/certificates/cu.bzh.chained.crt;
        ssl_certificate_key /cubzh/certificates/cu.bzh.key;
        location / {
            set $service_name tracking;
            proxy_pass http://$service_name$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen              443 ssl;
        server_name         appmaker.cu.bzh;
        ssl_certificate     /cubzh/certificates/cu.bzh.chained.crt;
        ssl_certificate_key /cubzh/certificates/cu.bzh.key;
        location / {
            set $service_name appmaker-server;
            proxy_pass http://$service_name$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Identifier $http_user_identifier;
            proxy_set_header User-Email $http_user_email;
        }
    }
    
    server {
        listen              80;
        server_name         docs.blip.game;
        location / {
            set $service_name lua-docs;
            proxy_pass http://$service_name$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # redirect any HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

}
