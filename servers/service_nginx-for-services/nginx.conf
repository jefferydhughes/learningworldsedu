#
# This is the NGINX config file for the Swarm service `nginx-for-services`
#

worker_processes 1;

events {}

http {

    # Use docker DNS server to resolve hostnames
    resolver 127.0.0.11 valid=30s ipv6=off;

    # subdomains to bring back from DigitalOcean
    # ------------------------------------
    # - appmaker.cu.bzh
    # - discord.cu.bzh
    # - docs.cu.bzh

    # Those are from the old nginx.conf
    # We should check if we need them or not:
    #
    # proxy_pass_request_headers on; # transmit incoming request heads
    # client_max_body_size 10M; # allow incoming requests of 10M max
    # underscores_in_headers on; # to remove later

    # redirect any HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # app.cu.bzh
    # ------------------------------------
    server {
        listen              443 ssl;
        server_name         app.cu.bzh;
        ssl_certificate     /voxowl/certificates/cu.bzh/cu.bzh.chained.crt;
        ssl_certificate_key /voxowl/certificates/cu.bzh/cu.bzh.key;
        location / {
            proxy_pass http://wasm;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # discord.cu.bzh
    # ------------------------------------
    server {
        listen              443 ssl;
        server_name         discord.cu.bzh;
        ssl_certificate     /voxowl/certificates/cu.bzh/cu.bzh.chained.crt;
        ssl_certificate_key /voxowl/certificates/cu.bzh/cu.bzh.key;
        location / {
            proxy_pass http://wasm-discord;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # link.cu.bzh
    # ------------------------------------
    server {
        listen              443 ssl;
        server_name         link.cu.bzh;
        ssl_certificate     /voxowl/certificates/cu.bzh/cu.bzh.chained.crt;
        ssl_certificate_key /voxowl/certificates/cu.bzh/cu.bzh.key;
        location / {
            proxy_pass http://link;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # files.cu.bzh
    # ------------------------------------
    server {
        listen              443 ssl;
        server_name         files.cu.bzh;
        ssl_certificate     /voxowl/certificates/cu.bzh/cu.bzh.chained.crt;
        ssl_certificate_key /voxowl/certificates/cu.bzh/cu.bzh.key;
        location / {
            proxy_pass http://fileserver;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # dashboard.cu.bzh
    # ------------------------------------
    server {
        listen              443 ssl;
        server_name         dashboard.cu.bzh;
        ssl_certificate     /voxowl/certificates/cu.bzh/cu.bzh.chained.crt;
        ssl_certificate_key /voxowl/certificates/cu.bzh/cu.bzh.key;
        location / {
            proxy_pass http://parent-dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # debug.cu.bzh
    # ------------------------------------
    server {
        listen              443 ssl;
        server_name         debug.cu.bzh;
        ssl_certificate     /voxowl/certificates/cu.bzh/cu.bzh.chained.crt;
        ssl_certificate_key /voxowl/certificates/cu.bzh/cu.bzh.key;
        location / {
            proxy_pass http://tracking;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # api.cu.bzh
    # ------------------------------------
    server {
        listen              443 ssl;
        server_name         api.cu.bzh;
        ssl_certificate     /voxowl/certificates/cu.bzh/cu.bzh.chained.crt;
        ssl_certificate_key /voxowl/certificates/cu.bzh/cu.bzh.key;
        client_max_body_size 20M;
        location / {
            limit_except GET HEAD POST OPTIONS PATCH DELETE {
                deny all;
            }
            proxy_pass http://hub-http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # me.cu.bzh (user-db-admin : MongoExpress)
    # ------------------------------------
    server {
        listen              443 ssl;
        server_name         me.cu.bzh;
        ssl_certificate     /voxowl/certificates/cu.bzh/cu.bzh.chained.crt;
        ssl_certificate_key /voxowl/certificates/cu.bzh/cu.bzh.key;
        location / {
            proxy_pass http://user-db-admin:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # codegen.cu.bzh
    # ------------------------------------
    server {
        listen              443 ssl;
        server_name         codegen.cu.bzh;
        ssl_certificate     /voxowl/certificates/cu.bzh/cu.bzh.chained.crt;
        ssl_certificate_key /voxowl/certificates/cu.bzh/cu.bzh.key;
        location / {
            proxy_pass http://codegen-server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
    }

    # discordbot.cu.bzh
    # ------------------------------------
    # server {
    #     listen              443 ssl;
    #     server_name         discordbot.cu.bzh;
    #     ssl_certificate     /voxowl/certificates/cu.bzh/cu.bzh.chained.crt;
    #     ssl_certificate_key /voxowl/certificates/cu.bzh/cu.bzh.key;
    #     location /ws/ {
    #         proxy_pass http://discordbot;
    #         proxy_read_timeout 36000s;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "Upgrade";
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    #     location / {
    #         proxy_pass http://discordbot;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }

    ######################################
    ### blip.game
    ######################################

    # files.blip.game
    # ------------------------------------
    server {
        listen              80;
        server_name         files.blip.game;
        location / {
            proxy_pass http://fileserver;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

}
