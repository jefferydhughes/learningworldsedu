<!doctype html>
<html lang="en-us" style="width: 100%; height: 100%">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
		/>
		<title>Cubzh</title>
		<style>
			@font-face {
				font-family: "monogram_extended";
				src: url("monogram_extended.ttf") format("truetype");
				font-weight: normal;
				font-style: normal;
			}

			/* CSS-reset */
			* {
				margin: 0;
				padding: 0;
				border: 0;
			}

			html {
				font-family: "monogram_extended", monospace;
				vertical-align: baseline;
				background-color: #333333;
			}

			body {
				width: 100%;
				height: 100%;
				background-color: #333333;
			}

			html,
			body {
				position: fixed;
				overflow: hidden;
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				touch-action: none;
				-webkit-touch-callout: none;
				-webkit-user-select: none;
				user-select: none;
				-webkit-tap-highlight-color: transparent;
			}

			ol,
			ul {
				list-style: none;
			}
			blockquote,
			q {
				quotes: none;
			}
			blockquote:before,
			blockquote:after,
			q:before,
			q:after {
				content: "";
				content: none;
			}
			table {
				border-collapse: collapse;
				border-spacing: 0;
			}
			/* End of CSS-reset */
			.emscripten {
				padding-right: 0;
				margin-left: auto;
				margin-right: auto;
				display: block;
			}
			textarea.emscripten {
				font-family: monospace;
				width: 80%;
			}
			div.emscripten {
				text-align: center;
			}
			/* the canvas *must not* have any border or padding, or mouse coords will be wrong */
			canvas.emscripten {
				border: 0px none;
				background-color: #0f0f0f;
				width: 100%;
				height: 100%;
			}

			/* This is for the error message displayed for unsupported browsers */
			p {
				font-size: 32pt;
			}

			h2 {
				font-weight: normal;
				font-size: 48pt;
				margin-bottom: 20px;
			}

			div#message {
				width: 100%;
				height: 100%;
				position: absolute;
				top: 0;
				left: 0;
				display: flex;
				justify-content: center;
				align-items: center;
			}

			div#message div {
				text-align: center;
				padding: 20px;
				color: #e5e5e5;
				background-color: transparent;
			}

			div#message div a {
				color: white;
				display: inline;
			}

			div#message div a.linkBtn {
				font-size: 76px;
				display: block;
				text-align: center;
				padding: 20px;
				text-decoration: none;
				color: #222;
				background-color: white;
				box-shadow:
					0px 2px 0 rgba(0, 0, 0, 0.3),
					2px 4px 1px rgba(0, 0, 0, 0.3);
				margin-bottom: 20px;
			}

			div#message div a.linkBtn:last-child {
				margin-bottom: 0;
			}

			div#message img {
				width: auto;
				height: 100px;
				display: inline-block;
				margin-bottom: 20px;
			}

			:root {
				--sait: var(
					--discord-safe-area-inset-top,
					env(safe-area-inset-top)
				);
				--saib: var(
					--discord-safe-area-inset-bottom,
					env(safe-area-inset-bottom)
				);
				--sail: var(
					--discord-safe-area-inset-left,
					env(safe-area-inset-left)
				);
				--sair: var(
					--discord-safe-area-inset-right,
					env(safe-area-inset-right)
				);
			}
		</style>
	</head>
	<body>
		<div>
			<input
				id="text-input-singleline"
				type="text"
				style="position: absolute; top: -25px"
			/>
			<textarea
				id="text-input-multiline"
				rows="5"
				cols="200"
				style="position: absolute; top: -10000px"
			></textarea>
			<textarea
				id="clipboard"
				style="
					width: 0;
					height: 0;
					border: 0;
					position: absolute;
					top: -10000px;
				"
				aria-hidden="true"
			></textarea>
		</div>

		<div id="message">
			<div>
				<img src="app-logo.svg" />
				<h2 id="message_title">
					Loading<span id="dot1">.</span><span id="dot2">.</span
					><span id="dot3">.</span>
				</h2>
				<p id="message_content"></p>
			</div>
		</div>

		<div id="android" style="display: none">
			<img src="app-logo.svg" />
			<p id="android_title">Want to play on Android? 🙂</p>
			<p id="android_content">
				<a
					href="https://play.google.com/store/apps/details?id=com.voxowl.pcubes.android"
					class="linkBtn"
					>Get on Play Store</a
				>
				<a href="https://app.cu.bzh/" class="linkBtn">Open in app</a>
			</p>
		</div>

		<div id="ios" style="display: none">
			<img src="app-logo.svg" />
			<p id="ios_title">Want to play on iOS? 🙂</p>
			<p id="ios_content">
				<a
					href="https://testflight.apple.com/join/7iMxzKht"
					class="linkBtn"
					>Get on TestFlight</a
				>
				<a href="https://app.cu.bzh/" class="linkBtn">Open in app</a>
			</p>
		</div>

		<div id="browser" style="display: none">
			<img src="app-logo.svg" />
			<p id="browser_title">Web browser not supported 😱</p>
			<p id="browser_content">
				We recommend using&nbsp;<a
					href="https://www.google.com/intl/en_en/chrome/"
					>Google Chrome</a
				>&nbsp;or&nbsp;<a
					href="https://www.mozilla.org/en-US/firefox/new/"
					>Mozilla Firefox</a
				>.
			</p>
		</div>

		<div style="width: 100%; height: 100%">
			<canvas
				class="emscripten"
				id="canvas"
				tabindex="-1"
				oncontextmenu="event.preventDefault()"
			></canvas>
		</div>

		<script type="text/javascript">
			// info for text field focus & keyboard opening
			let requestedTextInput = {
				elementID: "none",
				cursorBegin: 0,
				cursorEnd: 0,
			};

			let loadingIndicator = document.getElementById("message");
			let msgTitle = document.getElementById("message_title");
			let dots = [
				document.getElementById("dot1"),
				document.getElementById("dot2"),
				document.getElementById("dot3"),
			];
			let msgContent = document.getElementById("message_content");

			t = 0;
			const loadingTick = setInterval(function () {
				t++;
				if (t > 3) {
					t = 0;
				}
				for (i = 0; i < 3; i++) {
					dots[i].style.opacity = i < t ? "1.0" : "0.1";
				}
			}, 100);

			function isWebBrowserSupported() {
				if (
					navigator.userAgent.indexOf("Chrome") != -1 ||
					navigator.userAgent.indexOf("Firefox") != -1 ||
					navigator.userAgent.indexOf("Safari") != -1
				) {
					return true;
				}
				return false;
			}

			function isMobile() {
				return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
					navigator.userAgent,
				);
			}

			function showAndroidLinks() {
				msgTitle.innerHTML =
					document.getElementById("android_title").innerHTML;
				msgContent.innerHTML =
					document.getElementById("android_content").innerHTML;
			}

			function showIOSMessage() {
				msgTitle.innerHTML =
					document.getElementById("ios_title").innerHTML;
				msgContent.innerHTML =
					document.getElementById("ios_content").innerHTML;
			}

			function showBrowserSupportMessage() {
				msgTitle.innerHTML =
					document.getElementById("browser_title").innerHTML;
				msgContent.innerHTML =
					document.getElementById("browser_content").innerHTML;
			}

			var Module = {
				preInit: [],
				preRun: [],
				postRun: [],
				print: (function () {})(),
				printErr: function (text) {
					if (arguments.length > 1)
						text = Array.prototype.slice.call(arguments).join(" ");
					if (text) {
						console.error(text);
					}
				},
				canvas: (function () {
					var canvas = document.getElementById("canvas");

					// As a default initial behavior, pop up an alert when webgl context is lost. To make your
					// application robust, you may want to override this behavior before shipping!
					// See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
					canvas.addEventListener(
						"webglcontextlost",
						function (e) {
							alert(
								"WebGL context lost. You will need to reload the page.",
							);
							e.preventDefault();
						},
						false,
					);

					return canvas;
				})(),
				hideLoadingIndicator: function () {
					clearInterval(loadingTick);
					loadingIndicator.style.display = "none";
				},
			};

			window.onerror = function (message, source, lineno, colno, error) {
				// Module.setStatus('Exception thrown, see JavaScript console');
				// we need vx-wrapper to extract message from a C++ thrown exception
				if (typeof error === "number") {
					Module.printErr(
						"[Error " +
							error +
							" message] " +
							Module.getExceptionMessage(error),
					);
				} else {
					Module.printErr(message);
				}
			};

			function launch() {
				if (isMobile()) {
					// no browser filtering on mobile for now
				} else if (isWebBrowserSupported() == false) {
					clearInterval(loadingTick);
					showBrowserSupportMessage();
					return;
				}

				// everything is ok, launch web version!
				var s = document.createElement("script");
				s.type = "text/javascript";
				s.src = "cubzh.js";
				s.async = true;
				var t = document.getElementsByTagName("script")[0];
				t.parentNode.appendChild(s);
			}

			// String to UTF8 bytes
			function convertSelectionFromStringToUTF8Bytes(
				text,
				cursorStart,
				cursorEnd,
			) {
				// Check if the indices are valid
				if (
					cursorStart < 0 ||
					cursorEnd > text.length ||
					cursorStart > cursorEnd
				) {
					throw new Error("Invalid indices");
				}

				const substrBeforeSelectionStart = text.substring(
					0,
					cursorStart,
				);
				const utf8BytesBeforeStart = new TextEncoder().encode(
					substrBeforeSelectionStart,
				);
				if (cursorStart === cursorEnd) {
					return [
						utf8BytesBeforeStart.length,
						utf8BytesBeforeStart.length,
					];
				}
				const substrSelection = text.substring(cursorStart, cursorEnd);
				const utf8BytesSelection = new TextEncoder().encode(
					substrSelection,
				);
				return [
					utf8BytesBeforeStart.length,
					utf8BytesBeforeStart.length + utf8BytesSelection.length,
				];
			}

			// UTF8 bytes to string
			function convertSelectionFromUTF8BytesToString(
				utf8Bytes,
				cursorStart,
				cursorEnd,
			) {
				// Check if the indices are valid
				if (
					cursorStart < 0 ||
					cursorEnd > utf8Bytes.length ||
					cursorStart > cursorEnd
				) {
					throw new Error("Invalid indices");
				}

				const bytesBeforeStart = utf8Bytes.slice(0, cursorStart);
				const strBeforeStart = new TextDecoder().decode(
					new Uint8Array(bytesBeforeStart),
				);

				if (cursorStart === cursorEnd) {
					return [strBeforeStart.length, strBeforeStart.length];
				}

				const bytesBetweenStartAndEnd = utf8Bytes.slice(
					cursorStart,
					cursorEnd,
				);
				const strBetweenStartAndEnd = new TextDecoder().decode(
					new Uint8Array(bytesBetweenStartAndEnd),
				);

				return [
					strBeforeStart.length,
					strBeforeStart.length + strBetweenStartAndEnd.length,
				];
			}

			// Add an event listener to the input field for the 'input' event
			{
				let textInputSingleline = document.getElementById(
					"text-input-singleline",
				);
				let textInputMultiline = document.getElementById(
					"text-input-multiline",
				);

				function isSingleLineActive() {
					let res = document.activeElement === textInputSingleline;
					// console.log("[🐞][single]", res);
					return res;
				}

				function isMultilineActive() {
					let res = document.activeElement === textInputMultiline;
					// console.log("[🐞][multi]", res);
					return res;
				}

				// callback function
				function updateCursorPosition() {
					let text = "";
					if (isSingleLineActive()) {
						text = textInputSingleline.value;
						// Convert cursor positon to UTF-8 bytes position
						const cursorInBytes =
							convertSelectionFromStringToUTF8Bytes(
								text,
								textInputSingleline.selectionStart,
								textInputSingleline.selectionEnd,
							);
						// Notify the C/C++ layer
						Module.textInputUpdate(
							text,
							cursorInBytes[0],
							cursorInBytes[1],
						);
					} else if (isMultilineActive()) {
						text = textInputMultiline.value;
						// Convert cursor positon to UTF-8 bytes position
						const cursorInBytes =
							convertSelectionFromStringToUTF8Bytes(
								text,
								textInputMultiline.selectionStart,
								textInputMultiline.selectionEnd,
							);
						// Notify the C/C++ layer
						Module.textInputUpdate(
							text,
							cursorInBytes[0],
							cursorInBytes[1],
						);
					} else {
						console.log("[🐞][updateCursorPosition] ERROR");
						return;
					}
				}

				// Single-line input events
				textInputSingleline.vxEnableEvents = function () {
					this.addEventListener("input", function () {
						if (!isSingleLineActive()) {
							return;
						}
						updateCursorPosition();
					});

					this.addEventListener("keydown", function (e) {
						if (!isSingleLineActive()) {
							return;
						}
						if (e.key === "Enter" || e.keyCode === 13) {
							Module.textInputDone();
						}
					});

					this.addEventListener("keyup", function (e) {
						if (!isSingleLineActive()) {
							return;
						}
						updateCursorPosition();
					});
				};

				// Multi-line input events
				textInputMultiline.vxEnableEvents = function () {
					this.addEventListener("input", function () {
						if (!isMultilineActive()) {
							return;
						}
						updateCursorPosition();
					});

					this.addEventListener("keydown", function (e) {
						if (!isMultilineActive()) {
							return;
						}
						// Handle 'Tab' key press
						if (e.key === "Tab" || e.keyCode === 9) {
							// prevents the default behavior (changing focus)
							e.preventDefault();

							// manually insert a tab character at the cursor position
							const textarea = this;
							const start = textarea.selectionStart;
							const end = textarea.selectionEnd;

							// Set the value of the textarea to: text before caret + tab character + text after caret
							textarea.value =
								textarea.value.substring(0, start) +
								"\t" +
								textarea.value.substring(end);

							// Move the caret
							textarea.selectionStart = textarea.selectionEnd =
								start + 1;
						}
					});

					this.addEventListener("keyup", function (e) {
						if (!isMultilineActive()) {
							return;
						}
						updateCursorPosition();
					});
				};

				textInputSingleline.vxEnableEvents();
				textInputMultiline.vxEnableEvents();
			}

			document.addEventListener("touchend", function (e) {
				// Check if the virtual keyboard is wanted.
				if (requestedTextInput.elementID != "none") {
					let field = document.getElementById(
						requestedTextInput.elementID,
					);
					if (document.activeElement !== field) {
						field.focus();
						textInput.setSelectionRange(
							requestedTextInput.cursorBegin,
							requestedTextInput.cursorEnd,
						);
					}
					// consume the text input request
					requestedTextInput.elementID = "none";
				}
			});

			launch();
		</script>
		<!-- Build fails when removing this, but we don't need to script to be embedded,
		in fact, loading it after all checks is better, within launch() -->
		<!-- {{{ SCRIPT }}} -->
	</body>
</html>
